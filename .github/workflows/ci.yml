name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PNPM_VERSION: 9

jobs:
  # ──────────────────────────────────────────────
  # Job 1 — Lint & Typecheck
  # ──────────────────────────────────────────────
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://build:build@localhost:5432/build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  # ──────────────────────────────────────────────
  # Job 2 — Tests (needs Postgres + Redis)
  # ──────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Run database migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Run unit tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci_test_secret_min_64_chars_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          JWT_REFRESH_SECRET: ci_test_refresh_secret_min_64_chars_aaaaaaaaaaaaaaaaaaaaaa
          NODE_ENV: test

      - name: Run integration tests (e2e with mocked DB)
        run: cd apps/api && pnpm test:e2e
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci_test_secret_min_64_chars_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          JWT_REFRESH_SECRET: ci_test_refresh_secret_min_64_chars_aaaaaaaaaaaaaaaaaaaaaa
          NODE_ENV: test

  # ──────────────────────────────────────────────
  # Job 3 — Build (verifies production build works)
  # ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages and apps
        run: pnpm build
        env:
          # Stub values needed for Next.js build-time env validation
          DATABASE_URL: postgresql://build:build@localhost:5432/build
          NEXT_PUBLIC_API_URL: http://localhost:3011
          NEXT_PUBLIC_APP_URL: http://localhost:3010
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_build_stub
          NEXT_PUBLIC_CDN_URL: http://localhost:9000/edithpress-media
          NEXT_PUBLIC_RENDERER_URL: http://localhost:3003

  # ──────────────────────────────────────────────
  # Job 4 — Deploy to Staging (solo en push a main)
  # ──────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_PORT || 22 }}
          envs: RENDERER_SECRET,NEXT_PUBLIC_RENDERER_SECRET
          script: |
            set -e
            cd /opt/edithpress
            echo "==> Pulling latest code..."
            git pull origin main
            # Inject Sprint 03 secrets into .env if they are provided by CI
            if [ -n "${RENDERER_SECRET:-}" ]; then
              grep -q '^RENDERER_SECRET=' .env && \
                sed -i "s|^RENDERER_SECRET=.*|RENDERER_SECRET=${RENDERER_SECRET}|" .env || \
                echo "RENDERER_SECRET=${RENDERER_SECRET}" >> .env
            fi
            if [ -n "${NEXT_PUBLIC_RENDERER_SECRET:-}" ]; then
              grep -q '^NEXT_PUBLIC_RENDERER_SECRET=' .env && \
                sed -i "s|^NEXT_PUBLIC_RENDERER_SECRET=.*|NEXT_PUBLIC_RENDERER_SECRET=${NEXT_PUBLIC_RENDERER_SECRET}|" .env || \
                echo "NEXT_PUBLIC_RENDERER_SECRET=${NEXT_PUBLIC_RENDERER_SECRET}" >> .env
            fi
            echo "==> Running deploy script..."
            bash scripts/deploy-staging.sh
            echo "==> Deploy finished at $(date)"
        env:
          RENDERER_SECRET: ${{ secrets.RENDERER_SECRET }}
          NEXT_PUBLIC_RENDERER_SECRET: ${{ secrets.NEXT_PUBLIC_RENDERER_SECRET }}
