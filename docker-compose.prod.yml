version: '3.9'

# EdithPress — Production Compose
# Usage:
#   docker compose -f docker-compose.prod.yml --env-file .env up -d
#
# NOTE: All secrets come from the .env file — never hardcode them here.
#       Build images first:
#         docker build -f apps/api/Dockerfile      -t edithpress-api      .
#         docker build -f apps/admin/Dockerfile    -t edithpress-admin    .
#         docker build -f apps/builder/Dockerfile  -t edithpress-builder  .
#         docker build -f apps/renderer/Dockerfile -t edithpress-renderer .

networks:
  internal:
    driver: bridge
  public:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:

services:

  # ─────────────────────────────────────────────
  # Infrastructure services
  # ─────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No ports exposed to the host — only accessible within internal network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────
  # Application services
  # ─────────────────────────────────────────────

  api:
    image: edithpress-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_REGION: ${S3_REGION}
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      AWS_BUCKET_NAME: ${S3_BUCKET_NAME}
      AWS_REGION: ${S3_REGION}
      AWS_ENDPOINT: ${S3_ENDPOINT}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      APP_URL: ${APP_URL}
      API_URL: ${API_URL}
      RENDERER_SECRET: ${RENDERER_SECRET}
      IP_SALT: ${IP_SALT}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3011/api/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  admin:
    image: edithpress-admin
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      NEXT_PUBLIC_CDN_URL: ${NEXT_PUBLIC_CDN_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3010/"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  builder:
    image: edithpress-builder
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_RENDERER_URL: ${NEXT_PUBLIC_RENDERER_URL}
      NEXT_PUBLIC_CDN_URL: ${NEXT_PUBLIC_CDN_URL}
      RENDERER_SECRET: ${RENDERER_SECRET}
      NEXT_PUBLIC_RENDERER_SECRET: ${NEXT_PUBLIC_RENDERER_SECRET}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  renderer:
    image: edithpress-renderer
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_URL: ${API_URL}
      API_INTERNAL_URL: http://api:3011
      RENDERER_SECRET: ${RENDERER_SECRET}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_CDN_URL: ${NEXT_PUBLIC_CDN_URL}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # ─────────────────────────────────────────────
  # Database backup — diario a las 2am UTC
  # ─────────────────────────────────────────────
  backup:
    image: alpine:3.19
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_REGION: ${S3_REGION:-us-east-1}
    volumes:
      - ./scripts/backup-db.sh:/backup-db.sh:ro
    networks:
      - internal
    entrypoint: >
      sh -c "
        apk add --no-cache postgresql-client aws-cli bash &&
        echo '0 2 * * * bash /backup-db.sh >> /var/log/backup.log 2>&1' | crontab - &&
        crond -f -l 6
      "

  # ─────────────────────────────────────────────
  # Reverse proxy
  # ─────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - api
      - admin
      - builder
      - renderer
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      # Mount SSL certs (provision with certbot or copy manually)
      - ./infrastructure/nginx/certs:/etc/nginx/certs:ro
    networks:
      - internal
      - public
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
