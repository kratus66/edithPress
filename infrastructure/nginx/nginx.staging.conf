# ============================================================
# EdithPress — Nginx Staging Configuration (con Certbot / Let's Encrypt)
# ============================================================
# Diferencias vs nginx.prod.conf:
#   - Certificados desde /etc/letsencrypt/live/ (Certbot)
#   - HSTS con max-age más corto (staging)
#   - Logs más verbosos
# ============================================================

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent"';

  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log info;

  sendfile        on;
  keepalive_timeout 65;
  client_max_body_size 50M;

  # ──────────────────────────────────────────
  # Upstreams
  # ──────────────────────────────────────────
  upstream api_upstream      { server api:3011;     keepalive 32; }
  upstream admin_upstream    { server admin:3010;   keepalive 16; }
  upstream builder_upstream  { server builder:3002; keepalive 16; }
  upstream renderer_upstream { server renderer:3003; keepalive 32; }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # ──────────────────────────────────────────
  # Redirect HTTP → HTTPS (todos los hosts)
  # ──────────────────────────────────────────
  server {
    listen 80 default_server;
    server_name _;

    # Certbot ACME challenge (necesario para renovación automática)
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ──────────────────────────────────────────
  # Admin Panel — admin.edithpress.com
  # ──────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name admin.edithpress.com;

    ssl_certificate     /etc/letsencrypt/live/edithpress.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edithpress.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=3600" always;

    location / {
      proxy_pass         http://admin_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        $connection_upgrade;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }

  # ──────────────────────────────────────────
  # NestJS API — api.edithpress.com
  # ──────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name api.edithpress.com;

    ssl_certificate     /etc/letsencrypt/live/edithpress.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edithpress.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=3600" always;

    location / {
      proxy_pass         http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }

  # ──────────────────────────────────────────
  # Visual Builder — builder.edithpress.com
  # ──────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name builder.edithpress.com;

    ssl_certificate     /etc/letsencrypt/live/edithpress.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edithpress.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=3600" always;

    location / {
      proxy_pass         http://builder_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        $connection_upgrade;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }

  # ──────────────────────────────────────────
  # Tenant Subdomains — *.edithpress.com → renderer
  # Extrae el slug del subdominio y lo pasa como X-Tenant-Slug
  # ──────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name ~^(?<tenant_slug>[^.]+)\.edithpress\.com$;

    # Certificado wildcard *.edithpress.com (obtenido con DNS challenge)
    ssl_certificate     /etc/letsencrypt/live/edithpress.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edithpress.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=3600" always;

    location / {
      proxy_pass         http://renderer_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   X-Tenant-Slug     $tenant_slug;
    }
  }

  # ──────────────────────────────────────────
  # Custom Domains — cualquier otro dominio → renderer
  # ──────────────────────────────────────────
  server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/edithpress.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edithpress.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
      proxy_pass         http://renderer_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   X-Tenant-Domain   $host;
    }
  }
}
