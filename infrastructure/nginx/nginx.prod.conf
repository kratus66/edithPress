# ============================================================
# EdithPress — Nginx Production Configuration
# ============================================================
# Virtual hosts:
#   admin.edithpress.com   → admin panel  (port 3010)
#   api.edithpress.com     → NestJS API   (port 3011)
#   builder.edithpress.com → visual editor (port 3002)
#   *.edithpress.com       → renderer: tenant subdomains (port 3003)
#   custom domains         → renderer: custom tenant domains (port 3003)
# ============================================================

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ──────────────────────────────────────────
  # Logging
  # ──────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent"';

  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  sendfile        on;
  keepalive_timeout 65;
  client_max_body_size 50M;

  # ──────────────────────────────────────────
  # Upstreams (service names from docker-compose)
  # ──────────────────────────────────────────
  upstream api_upstream {
    server api:3011;
    keepalive 32;
  }

  upstream admin_upstream {
    server admin:3010;
    keepalive 16;
  }

  upstream builder_upstream {
    server builder:3002;
    keepalive 16;
  }

  upstream renderer_upstream {
    server renderer:3003;
    keepalive 32;
  }

  # ──────────────────────────────────────────
  # Common proxy headers macro
  # ──────────────────────────────────────────
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # ──────────────────────────────────────────
  # Redirect HTTP → HTTPS (all hosts)
  # ──────────────────────────────────────────
  server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ──────────────────────────────────────────
  # Admin Panel — admin.edithpress.com
  # ──────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name admin.edithpress.com;

    ssl_certificate     /etc/nginx/certs/edithpress.com.crt;
    ssl_certificate_key /etc/nginx/certs/edithpress.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
      proxy_pass         http://admin_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        $connection_upgrade;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }

  # ──────────────────────────────────────────
  # NestJS API — api.edithpress.com
  # ──────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name api.edithpress.com;

    ssl_certificate     /etc/nginx/certs/edithpress.com.crt;
    ssl_certificate_key /etc/nginx/certs/edithpress.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
      proxy_pass         http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }

  # ──────────────────────────────────────────
  # Visual Builder — builder.edithpress.com
  # ──────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name builder.edithpress.com;

    ssl_certificate     /etc/nginx/certs/edithpress.com.crt;
    ssl_certificate_key /etc/nginx/certs/edithpress.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
      proxy_pass         http://builder_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        $connection_upgrade;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }

  # ──────────────────────────────────────────
  # Tenant Subdomains — *.edithpress.com → renderer
  # Extraemos el slug del subdominio y lo pasamos como header
  # ──────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name ~^(?<tenant_slug>[^.]+)\.edithpress\.com$;

    ssl_certificate     /etc/nginx/certs/edithpress.com.crt;
    ssl_certificate_key /etc/nginx/certs/edithpress.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
      proxy_pass         http://renderer_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      # Header leído por el middleware del renderer para detectar el tenant
      proxy_set_header   X-Tenant-Slug     $tenant_slug;
    }
  }

  # ──────────────────────────────────────────
  # Custom Domains — cualquier otro dominio → renderer
  # El middleware del renderer detecta el tenant por X-Tenant-Domain
  # ──────────────────────────────────────────
  server {
    listen 443 ssl default_server;
    server_name _;

    # Wildcard / self-signed cert fallback (reemplazar con cert real por dominio)
    ssl_certificate     /etc/nginx/certs/edithpress.com.crt;
    ssl_certificate_key /etc/nginx/certs/edithpress.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
      proxy_pass         http://renderer_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      # Header leído por el middleware del renderer para custom domains
      proxy_set_header   X-Tenant-Domain   $host;
      # Limpiar X-Tenant-Slug para que el renderer resuelva el tenant vía API usando X-Tenant-Domain
      proxy_set_header   X-Tenant-Slug     "";
    }
  }
}
