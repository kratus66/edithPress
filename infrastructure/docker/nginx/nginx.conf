# EdithPress — Nginx Reverse Proxy (production)
#
# Routing:
#   app.edithpress.com          → admin (3010)
#   api.edithpress.com          → api   (3011)
#   builder.edithpress.com      → builder (3002)
#   *.edithpress.com            → renderer (3003) — multi-tenant catch-all
#
# The renderer middleware reads X-Tenant-Slug injected here to identify tenants.

upstream admin    { server admin:3010; }
upstream api      { server api:3011; }
upstream builder  { server builder:3002; }
upstream renderer { server renderer:3003; }

# ── Admin ────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name app.edithpress.com;

    location / {
        proxy_pass http://admin;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── API ───────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.edithpress.com;

    client_max_body_size 50M;

    location / {
        proxy_pass http://api;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── Builder ───────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name builder.edithpress.com;

    location / {
        proxy_pass http://builder;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── Renderer (multi-tenant catch-all) ─────────────────────────────────────────
# Matches any subdomain that isn't app/api/builder (e.g. mytenant.edithpress.com)
server {
    listen 80;
    server_name ~^(?<tenant>[^.]+)\.edithpress\.com$;

    # Don't match reserved subdomains
    if ($tenant ~* "^(app|api|builder|www|mail|smtp|ftp|cdn)$") {
        return 404;
    }

    location / {
        proxy_pass http://renderer;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Inject tenant slug so renderer middleware can identify the tenant
        proxy_set_header X-Tenant-Slug     $tenant;
    }
}
